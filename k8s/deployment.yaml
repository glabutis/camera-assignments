apiVersion: apps/v1
kind: Deployment
metadata:
  name: camera-assignments
  labels:
    app: camera-assignments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: camera-assignments
  template:
    metadata:
      labels:
        app: camera-assignments
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: camera-assignments
          image: ghcr.io/glabutis/camera-assignments:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: camera-assignments-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: camera-db-secret
                  key: DATABASE_URL
