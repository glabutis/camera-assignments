# DO NOT put real credentials here. This file is a template only.
#
# To create the actual secret, run:
#   kubectl create secret generic camera-db-secret \
#     --from-literal=DATABASE_URL=postgresql://camapp:yourpassword@postgres:5432/camapp
#
# The structure kubectl creates looks like this:
apiVersion: v1
kind: Secret
metadata:
  name: camera-db-secret
type: Opaque
data:
  # base64-encoded connection string
  DATABASE_URL: BASE64_ENCODED_VALUE_HERE
