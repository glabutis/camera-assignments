<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Production Roles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Weekend Production Roles</h1>
    <span id="clock"></span>
  </header>

  <section id="grid-section">
    <div id="assignments-grid"></div>
    <p id="empty">No assignments loaded yet.</p>
  </section>

  <script>
    const clockEl  = document.getElementById('clock');
    const grid     = document.getElementById('assignments-grid');
    const emptyEl  = document.getElementById('empty');

    function updateClock() {
      clockEl.textContent = new Date().toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
      });
    }
    updateClock();
    setInterval(updateClock, 1000);

    function render(assignments) {
      grid.innerHTML = assignments.map(a => `
        <div class="card">
          <span class="role">${escHtml(a.role)}</span>
          <span class="name">${escHtml(a.name)}</span>
          ${a.isLead ? '<span class="badge">Point Person</span>' : ''}
        </div>
      `).join('');

      emptyEl.classList.toggle('visible', assignments.length === 0);
    }

    function escHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    fetch('/api/assignments')
      .then(r => r.json())
      .then(render)
      .catch(err => console.error('Initial fetch failed:', err));

    let ws;
    let reconnectDelay = 1000;

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}`);

      ws.addEventListener('open', () => {
        reconnectDelay = 1000;
      });

      ws.addEventListener('message', e => {
        try {
          render(JSON.parse(e.data));
        } catch (err) {
          console.error('Failed to parse message:', err);
        }
      });

      ws.addEventListener('close', () => {
        setTimeout(connect, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 2, 30000);
      });

      ws.addEventListener('error', () => {
        ws.close();
      });
    }

    connect();
  </script>
</body>
</html>
