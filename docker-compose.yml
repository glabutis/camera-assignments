services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: camapp
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: camapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    # To use the prebuilt image instead of building locally, comment out
    # the line above and uncomment the line below:
    # image: ghcr.io/glabutis/camera-assignments:latest
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://camapp:changeme@db:5432/camapp
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
