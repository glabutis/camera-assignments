services:
  app:
    build: .
    # To use a prebuilt image instead of building locally, comment out
    # the line above and uncomment the line below:
    # image: ghcr.io/glabutis/camera-assignments:latest
    ports:
      - "3000:3000"
    environment:
      SHEET_ID: your-sheet-id-here
      SHEET_RANGE: Sheet1!A2:C
      POLL_INTERVAL_MS: "30000"
      GOOGLE_SERVICE_ACCOUNT_KEY_PATH: /secrets/service-account.json
    volumes:
      - ./service-account.json:/secrets/service-account.json:ro
    restart: unless-stopped
